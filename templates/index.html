<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory System</title>
<link rel="stylesheet" href="/static/app.css?v=2">

</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <span class="dot" id="statusDot"></span>
        <span>Memory System</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">导航</div>
        <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <span class="icon">&#9632;</span> <span>总览</span>
        </button>
        <button class="nav-item" data-page="sessions" onclick="navigate('sessions')">
          <span class="icon">&#9654;</span> <span>会话</span>
          <span class="badge" id="sessionCount">0</span>
        </button>
        <button class="nav-item" data-page="memories" onclick="navigate('memories')">
          <span class="icon">&#9670;</span> <span>记忆库</span>
          <span class="badge" id="memoryCount">0</span>
        </button>
        <button class="nav-item" data-page="search" onclick="navigate('search')">
          <span class="icon">&#9906;</span> <span>搜索</span>
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">管理</div>
        <button class="nav-item" data-page="knowledge" onclick="navigate('knowledge')">
          <span class="icon">&#9733;</span> <span>知识库</span>
        </button>
        <button class="nav-item" data-page="fusion" onclick="navigate('fusion')">
          <span class="icon">&#8644;</span> <span>融合日志</span>
        </button>
        <button class="nav-item" data-page="skills" onclick="navigate('skills')">
          <span class="icon">&#9889;</span> <span>技能库</span>
          <span class="badge" id="skillCount">0</span>
        </button>
        <button class="nav-item" data-page="modules" onclick="navigate('modules')">
          <span class="icon">&#9638;</span> <span>模块</span>
          <span class="badge" id="moduleCount">0</span>
        </button>
        <button class="nav-item" data-page="reasoning" onclick="navigate('reasoning')">
          <span class="icon">&#9881;</span> <span>推理链</span>
          <span class="badge" id="reasoningCount">0</span>
        </button>
        <button class="nav-item" data-page="settings" onclick="navigate('settings')">
          <span class="icon">&#9881;</span> <span>设置</span>
        </button>
      </div>
    </nav>
    <div class="sidebar-footer">
      <span id="workerStatus">Worker: --</span>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="btn-icon btn-ghost menu-toggle" onclick="toggleSidebar()">&#9776;</button>
      <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-current">总览</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" onclick="refreshCurrent()">&#8635; 刷新</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Desktop Pet -->
<div class="pet-container" id="petContainer">
  <div class="pet-tooltip" id="petTooltip">Memory System</div>
  <div class="pet sleeping" id="pet">
    <div class="pet-zzz">z</div>
    <div class="pet-body">
      <div class="pet-eyes">
        <div class="pet-eye"></div>
        <div class="pet-eye"></div>
      </div>
      <div class="pet-mouth"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script src="/static/app.js?v=2"></script>

</body>
</html>
